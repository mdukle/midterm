<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reagent Tracker App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>

<body class="py-4">
    <div class="app mx-auto">
        <div class="h1">Reagents List</div>
        <div class="d-flex justify-content-end mb-3">
            <button id="openNewModal" data-bs-toggle="modal" data-bs-target="#modal-add">Add New Reagent</button>
        </div>
        <div id="reagents" class="overflow-y-auto"></div>
    </div>

    <!-- modal needs to be in body level -->
    <!-- modal dialog for adding -->
    <div id='modal-add' class="modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add a new Reagent</h5>
                    <div id="" reagents class="overflow-y-auto"></div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="new-reagent-form">
                        <div class="mb-3">
                            <label for="title" class="form-label">Title</label>
                            <input type="text" class="form-control" id="title">
                        </div>
                        <div class="mb-3">
                            <label for="desc" class="form-label">Description</label>
                            <textarea class="form-control" id="desc" rows="3"></textarea>
                        </div>
                        <div class='text-danger' id='msg'></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id='close-add-modal' type="button" class="btn btn-secondary"
                        data-bs-dismiss="modal">Close</button>
                    <button id='add-btn' type="button" class="btn btn-primary">Add</button>
                </div>
            </div>
        </div>
    </div>

    <div id='modal-edit' class="modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Reagent</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="edit-reagent-form">
                        <div class="mb-3">
                            <label for="titleEdit" class="form-label">Title</label>
                            <input type="text" class="form-control" id="titleEdit">
                        </div>
                        <div class="mb-3">
                            <label for="descEdit" class="form-label">Description</label>
                            <textarea class="form-control" id="descEdit" rows="3"></textarea>
                        </div>
                        <div class='text-danger' id='msgEdit'></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id='close-edit-modal' type="button" class="btn btn-secondary"
                        data-bs-dismiss="modal">Close</button>
                    <button id='edit-btn' type="button" class="btn btn-warning">Yes, Update it</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="main.js"></script>
</body>

</html>
